# SwiftLint configuration — Gestion Travaux
# Focus: enforce non-negotiable architecture rules only.
# Default rules are largely disabled to avoid false positives on valid Swift idioms.

included:
  - Gestion Travaux

excluded:
  - Gestion TravauxTests
  - Gestion Travaux.xcodeproj

# ─── Disabled default rules (false positives on valid code) ──────────────────
disabled_rules:
  - trailing_whitespace
  - line_length
  - identifier_name          # i, r, g, b, e, md are valid Swift idioms
  - function_body_length     # AudioEngine.demarrer() is legitimately long
  - unused_optional_binding  # let _ = is sometimes intentional
  - type_body_length
  - file_length
  - cyclomatic_complexity
  - type_name                # Gestion_TravauxApp is Xcode-generated, underscore unavoidable

# ─── Custom rules — architecture non-negotiables ─────────────────────────────
custom_rules:

  # Règle non-négociable : modelContext.save() doit toujours être dans do/catch.
  # try? silencieux = perte de données potentielle sans feedback utilisateur.
  no_try_optional_on_save:
    name: "No try? on modelContext.save()"
    regex: 'try\?\s+\w*[Cc]ontext\.save\(\)'
    message: "Utiliser do { try context.save() } catch — risque de perte de données silencieuse (règle non-négociable architecture)"
    severity: error

  no_try_force_on_save:
    name: "No try! on modelContext.save()"
    regex: 'try!\s+\w*[Cc]ontext\.save\(\)'
    message: "Utiliser do { try context.save() } catch — try! crashe l'app en production"
    severity: error
